blueprint:
  name: Boiler Heat Schedule New
  description: Switcher boiler water heating schedule
  domain: automation
  input:
    boiler_entity:
      name: Switcher Boiler Entity
      selector:
        entity:
          domain: switch
    water_temp_entity:
      name: Water Temperature Entity
      selector:
        entity:
          domain: sensor
    time_on_entity:
      name: Time ON Helper
      selector:
        entity:
          domain: input_datetime
    time_off_entity:
      name: Time OFF Helper
      selector:
        entity:
          domain: input_datetime
    target_temp_value:
      name: Target Temperature
      default: 60
      selector:
        number:
          min: 0
          max: 70
          unit_of_measurement: "°C"
    threshold_temp_value:
      name: Threshold Temperature
      default: 50
      selector:
        number:
          min: 0
          max: 70
          unit_of_measurement: "°C"
    weekday:
      name: Days of the week for Schedule
      default: [sun, mon, tue, wed, thu, fri, sat]
      selector:
        select:
          options:
            - label: Sunday
              value: sun
            - label: Monday
              value: mon
            - label: Tuesday
              value: tue
            - label: Wednesday
              value: wed
            - label: Thursday
              value: thu
            - label: Friday
              value: fri
            - label: Saturday
              value: sat
          custom_value: false
          multiple: true

trigger:
  # Start Time
  - trigger: time
    at: !input time_on_entity
    id: boiler_on

  # Start Boiler below threshold
  - trigger: numeric_state
    entity_id: !input water_temp_entity
    below: !input threshold_temp_value
    id: boiler_on

  # Stop Boiler above target
  - trigger: numeric_state
    entity_id: !input water_temp_entity
    above: !input target_temp_value
    id: boiler_off_temp

  # End Time
  - trigger: time
    at: !input time_off_entity
    id: boiler_off_time

  # HA Startup - in case of outages
  - trigger: homeassistant
    event: start
    id: boiler_on

action:
  - choose:
      - conditions:
          - condition: trigger
            id: boiler_on
          - condition: state
            entity_id: input_boolean.vacation
            state: "off"
          - condition: time
            after: !input time_on_entity
            before: !input time_off_entity
            weekday: !input weekday
          - condition: numeric_state
            entity_id: !input water_temp_entity
            below: !input threshold_temp_value
        sequence:
          - action: switch.turn_on
            target:
              entity_id: !input boiler_entity

      - conditions:
          - condition: trigger
            id: boiler_off_temp
          - condition: time
            after: !input time_on_entity
            before: !input time_off_entity
            weekday: !input weekday
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input boiler_entity

      - conditions:
          - condition: trigger
            id: boiler_off_time
          - condition: time
            weekday: !input weekday
        sequence:
          - action: switch.turn_off
            target:
              entity_id: !input boiler_entity
